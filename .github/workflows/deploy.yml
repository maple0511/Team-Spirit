name: Deploy
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}   # 如果你用密码登录
          script: |
            # 如果目录不存在，先克隆（注意路径改成 Team-Spirit）
            if [ ! -d "/root/Team-Spirit" ]; then
              git clone https://github.com/${{ github.repository }}.git /root/Team-Spirit
            fi
            cd /root/Team-Spirit
            git pull origin main
            docker compose down || true
            docker compose up --build -d