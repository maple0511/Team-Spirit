name: Build and Deploy

on:
  push:
    branches:
      - main
      - Felix-Branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Docker Compose file
        run: docker compose config

      - name: Build all services
        run: docker compose build

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to server by SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          rsync -az --delete --exclude ".git" ./ "$SERVER_USER@$SERVER_HOST:$DEPLOY_PATH/"
          ssh -i ~/.ssh/deploy_key "$SERVER_USER@$SERVER_HOST" "cd $DEPLOY_PATH && docker compose up -d --build"